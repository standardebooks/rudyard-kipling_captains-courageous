		<section id="dedication" epub:type="dedication">
			<p>To<br/>
			James Conland, <abbr epub:type="z3998:name-title z3998:initialism">M.D.</abbr>,<br/>
			Brattleboro, Vermont</p>
			<footer>I ploughed the land with horses,<br/>
			But my heart was ill at ease,<br/>
			For the old sea-faring men<br/>
			Came to me now and then,<br/>
			With their sagas of the seas.<br/>
			<cite>Longfellow.</cite></footer>
		</section>
