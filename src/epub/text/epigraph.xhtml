		<title>Epigraph</title>

	<body epub:type="frontmatter z3998:fiction">
		<section id="epigraph" epub:type="epigraph">
			<blockquote epub:type="z3998:verse">
				<p>
					<span>I ploughed the land with horses,</span>
					<br/>
					<span class="i1">But my heart was ill at ease,</span>
					<br/>
					<span>For the old sea-faring men</span>
					<br/>
					<span>Came to me now and then,</span>
					<br/>
					<span class="i1">With their sagas of the seas.</span>
				</p>
				<cite>Longfellow</cite>
			</blockquote>
		</section>
	</body>
